services:
  - type: web
    name: dispensed
    runtime: ruby
    region: frankfurt
    plan: starter
    buildCommand: bundle install && bundle exec rails assets:precompile
    startCommand: bundle exec rails server
    preDeployCommand: bundle exec rails db:migrate
    healthCheckPath: /users/sign_in
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: RAILS_MASTER_KEY
        sync: false  # Set manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: dispensed-db
          property: connectionString

  - type: worker
    name: dispensed-worker
    runtime: ruby
    region: frankfurt
    plan: starter
    buildCommand: bundle install
    startCommand: bundle exec rails solid_queue:start
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_MASTER_KEY
        sync: false  # Set manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: dispensed-db
          property: connectionString

databases:
  - name: dispensed-db
    region: frankfurt
    plan: starter
    databaseName: dispensed_production
    user: dispensed
